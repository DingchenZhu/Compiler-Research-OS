compiler_config:
  flags: []
  num_warps: [4, 8]
  num_stages: [3, 4]
  block_sizes:
    - BLOCK_M: 16
      BLOCK_N: 16
      BLOCK_K: 32
    - BLOCK_M: 32
      BLOCK_N: 32
      BLOCK_K: 32
    - BLOCK_M: 64
      BLOCK_N: 64
      BLOCK_K: 32
benchmark:
  warmup: 20
  repeat: 100
  seed: 0
metrics:
  - latency_ms
  - tflops
  - bandwidth_gbps
  - register_count
  - shared_memory_bytes
